<!doctype html>
<html>
  <head>
    <title>Greeting</title>

    <style>
      body {
        background-color: #37260f;
        color: white;
        text-align: center;
        font-family: Arial;
      }

      h1 {
        color: #e8820e;
      }

      button {
        background-color: #e8820e;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
      }
    </style>
  </head>

  <body>
    <h1 id="greeting"></h1>

    <br />

    <a href="/">
      <button>Go Back</button>
    </a>

    <script>
      const params = new URLSearchParams(window.location.search);
      const name = params.get("name");

      document.getElementById("greeting").textContent = "Hello, " + name + "!";
    </script>
  </body>
</html>
